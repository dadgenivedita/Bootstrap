<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Navbar Examples</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg shadow-sm"
     style="background: linear-gradient(to right,#cc6a1a,#8d2910);">

    <div class="container">

        <a class="navbar-brand text-white fw-bold fs-3" href="#">
            <i class="bi bi-egg-fried"></i> FoodieHub
        </a>

        <button class="navbar-toggler bg-light" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="bi bi-house-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="bi bi-grid-fill"></i> Menu
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="bi bi-fire"></i> Offers
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="bi bi-star-fill"></i> Popular
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="bi bi-telephone-fill"></i> Contact
                    </a>
                </li>

            </ul>

            <a href="#" class="btn btn-light rounded-pill fw-bold">
                Order Now
            </a>

        </div>

    </div>

</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
