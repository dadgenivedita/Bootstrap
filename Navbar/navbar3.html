<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Navbar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg shadow-sm"
     style="background: linear-gradient(to right,#87899c);">

    <div class="container">

        <a class="navbar-brand fs-4" href="#">
            <i class="fa-brands fa-apple"></i>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link text-black" href="#">Store</a>
                </li>
                <li class="nav-item"><a class="nav-link text-black" href="#">Mac</a></li>
                <li class="nav-item"><a class="nav-link text-black" href="#">iPad</a></li>
                <li class="nav-item"><a class="nav-link text-black" href="#">iPhone</a></li>
                <li class="nav-item"><a class="nav-link text-black" href="#">Watch</a></li>
                <li class="nav-item"><a class="nav-link text-black" href="#">AirPods</a></li>
                <li class="nav-item"><a class="nav-link text-black" href="#">Support</a></li>
            </ul>

            <div class="d-flex gap-3">
                <a href="#" class="text-dark">
                    <i class="bi bi-search"></i>
                </a>

                <a href="#" class="text-dark">
                    <i class="bi bi-bag"></i>
                </a>
            </div>

        </div>

    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
