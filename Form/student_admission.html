<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#06b6d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Arial, sans-serif;
}

.admission-card{
    width:100%;
    max-width:550px;
    border:none;
    border-radius:20px;
    background:#fff;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.logo{
    font-size:3.5rem;
    color:#0ea5e9;
}

.form-control,
.form-select{
    border-radius:10px;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    border-color:#0ea5e9;
    box-shadow:0 0 8px rgba(14,165,233,.3);
}

.input-group-text{
    background:#0ea5e9;
    color:#fff;
    border:none;
}

.btn-submit{
    background:#0ea5e9;
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:bold;
}

.btn-submit:hover{
    background:#0284c7;
}
</style>
</head>

<body>

<div class="card admission-card">
<div class="card-body p-5">

<div class="text-center mb-4">
<i class="bi bi-mortarboard-fill logo"></i>
<h2 class="fw-bold mt-2">Student Admission</h2>
<p class="text-muted">Fill your details below</p>
</div>

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-person-fill"></i>
</span>
<input type="text" class="form-control" placeholder="Enter Full Name" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>
<input type="email" class="form-control" placeholder="Enter Email" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-telephone-fill"></i>
</span>
<input type="tel" class="form-control" placeholder="Enter Mobile Number" required>
</div>
</div>

<div class="mb-3">
<label class="form-label">Date of Birth</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-calendar-date-fill"></i>
</span>
<input type="date" class="form-control">
</div>
</div>

<div class="mb-3">
<label class="form-label">Gender</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Other</label>
</div>

</div>

<div class="mb-3">
<label class="form-label">Course</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-book-fill"></i>
</span>

<select class="form-select">
<option selected>Select Course</option>
<option>Computer Engineering</option>
<option>Information Technology</option>
<option>Electronics Engineering</option>
<option>Mechanical Engineering</option>
<option>Civil Engineering</option>
</select>

</div>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" rows="3" placeholder="Enter Address"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload Photo</label>
<input type="file" class="form-control">
</div>

<div class="form-check mb-4">
<input class="form-check-input" type="checkbox" id="agree">
<label class="form-check-label" for="agree">
I agree to the Terms & Conditions
</label>
</div>

<button type="submit" class="btn btn-submit w-100">
<i class="bi bi-send-fill"></i> Submit Admission Form
</button>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
